from_latest_tag = false
ignore_merge_commits = true
disable_changelog = false
generate_mono_repository_global_tag = true
tag_prefix = "v"

# Bump version everywhere: Cargo.toml drives pyproject.toml via dynamic = ["version"]
pre_bump_hooks = [
    "sed -i '0,/^version = /s/^version = \".*\"/version = \"{{version}}\"/' Cargo.toml",
    "cargo generate-lockfile",
    "sed -i 's/\"version\": \".*\"/\"version\": \"{{version}}\"/' editors/vscode/package.json editors/obsidian/package.json editors/obsidian/manifest.json editors/word/package.json packages/snapper-wasm/package.json npm/package.json",
]

[commit_types]
enh = { changelog_title = "Enhancements" }
bug = { changelog_title = "Bugfixes" }
maint = { changelog_title = "Maintenance" }
prj = { changelog_title = "Project" }
doc = { changelog_title = "Documentation" }
tst = { changelog_title = "Tests" }
bld = { changelog_title = "Buildsystem" }
gen = { changelog_title = "Generated" }

[changelog]
path = "CHANGELOG.md"
authors = [{ username = "HaoZeke", signature = "Rohit Goswami" }]
