<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shell-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A3D"/>
      <stop offset="100%" style="stop-color:#1B3D2A"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BAF5B"/>
      <stop offset="100%" style="stop-color:#4D8C3E"/>
    </linearGradient>
  </defs>

  <!-- Dark green background -->
  <rect width="512" height="512" rx="40" fill="#2D5A3D"/>

  <!-- Cream circle -->
  <circle cx="256" cy="240" r="195" fill="#F5F0E1"/>

  <!-- Back leg (left) -->
  <ellipse cx="155" cy="310" rx="25" ry="14" fill="#4D8C3E" transform="rotate(-15 155 310)"/>
  <!-- Back leg (right) -->
  <ellipse cx="320" cy="315" rx="22" ry="13" fill="#4D8C3E" transform="rotate(10 320 315)"/>

  <!-- Front leg -->
  <ellipse cx="350" cy="290" rx="26" ry="13" fill="#6BAF5B" transform="rotate(20 350 290)"/>

  <!-- Tail -->
  <path d="M 115 270 Q 90 275, 80 265 Q 78 258, 88 255 Q 100 255, 115 262" fill="#4D8C3E"/>

  <!-- Body/belly -->
  <ellipse cx="245" cy="278" rx="110" ry="42" fill="#6BAF5B"/>

  <!-- Shell dome -->
  <ellipse cx="240" cy="248" rx="115" ry="72" fill="url(#shell-top)" stroke="#1B3D2A" stroke-width="2"/>

  <!-- Shell scutes: center row -->
  <path d="M 185 235 L 200 215 L 230 215 L 245 235 L 230 250 L 200 250 Z" fill="none" stroke="#1B3D2A" stroke-width="2" opacity="0.4"/>
  <path d="M 230 235 L 245 215 L 275 215 L 290 235 L 275 250 L 245 250 Z" fill="none" stroke="#1B3D2A" stroke-width="2" opacity="0.4"/>
  <!-- Shell scutes: top row -->
  <path d="M 205 215 L 218 200 L 245 200 L 258 215 L 245 228 L 218 228 Z" fill="none" stroke="#1B3D2A" stroke-width="2" opacity="0.3"/>
  <!-- Shell scutes: sides -->
  <path d="M 160 248 L 175 235 L 200 238 L 205 252 L 190 260 L 165 258 Z" fill="none" stroke="#1B3D2A" stroke-width="2" opacity="0.3"/>
  <path d="M 280 238 L 295 228 L 315 235 L 320 250 L 305 258 L 285 255 Z" fill="none" stroke="#1B3D2A" stroke-width="2" opacity="0.3"/>
  <!-- Shell ridge -->
  <path d="M 145 260 Q 200 220, 245 218 Q 290 220, 340 258" fill="none" stroke="#1B3D2A" stroke-width="2.5" opacity="0.25"/>

  <!-- Neck -->
  <path d="M 330 255 Q 360 240, 375 228 Q 385 222, 390 218"
        fill="none" stroke="#6BAF5B" stroke-width="26" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="395" cy="210" rx="28" ry="22" fill="#6BAF5B" transform="rotate(-10 395 210)"/>

  <!-- Snout -->
  <path d="M 415 205 Q 428 202, 430 210 Q 428 216, 418 215" fill="#7BC46A" stroke="#3D7A30" stroke-width="1.5"/>

  <!-- Eye -->
  <circle cx="400" cy="203" r="5.5" fill="#1B3D2A"/>
  <circle cx="401.5" cy="201.5" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 415 212 Q 420 216, 425 214" fill="none" stroke="#3D7A30" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Red snap marks -->
  <line x1="410" y1="180" x2="415" y2="168" stroke="#E04040" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="420" y1="178" x2="427" y2="167" stroke="#E04040" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="430" y1="180" x2="438" y2="170" stroke="#E04040" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g fill="#C4B88A" opacity="0.6">
    <path d="M 440 285 l 2 -5 2 5 -5 -2 5 2 Z"/>
    <path d="M 145 195 l 2 -5 2 5 -5 -2 5 2 Z"/>
    <path d="M 370 165 l 2 -4 2 4 -4 -2 4 2 Z"/>
    <path d="M 120 310 l 2 -5 2 5 -5 -2 5 2 Z"/>
    <path d="M 340 340 l 1.5 -4 1.5 4 -4 -1.5 4 1.5 Z"/>
  </g>

  <!-- Name -->
  <text x="256" y="400" font-family="'Nunito', 'Jost', system-ui, sans-serif" font-size="52"
        font-weight="800" fill="#2D5A3D" text-anchor="middle" letter-spacing="2">snapper</text>

  <!-- Tagline -->
  <text x="256" y="428" font-family="'Jost', system-ui, sans-serif" font-size="15"
        font-weight="600" fill="#2D5A3D" opacity="0.5" text-anchor="middle" letter-spacing="3">SEMANTIC LINE BREAKS</text>
</svg>
