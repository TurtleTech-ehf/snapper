<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004D40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00695C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="240" r="220" fill="#E8F5E9" opacity="0.15"/>

  <!-- Tail (spiky, snapping turtle style) -->
  <path d="M 120 280 Q 80 290, 60 270 Q 50 260, 65 250 Q 75 245, 90 260 Q 100 268, 120 265"
        fill="url(#skin)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Back legs -->
  <ellipse cx="155" cy="310" rx="28" ry="18" fill="url(#skin)" stroke="#2E7D32" stroke-width="2" transform="rotate(-20 155 310)"/>
  <ellipse cx="340" cy="310" rx="28" ry="18" fill="url(#skin)" stroke="#2E7D32" stroke-width="2" transform="rotate(20 340 310)"/>

  <!-- Claws on back legs -->
  <path d="M 132 320 L 125 330 M 138 323 L 133 333 M 144 325 L 140 335" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 353 320 L 360 330 M 347 323 L 352 333 M 341 325 L 345 335" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Shell body (dome shape with ridge texture) -->
  <ellipse cx="250" cy="250" rx="130" ry="85" fill="url(#shell)" stroke="#1B5E20" stroke-width="3"/>

  <!-- Shell pattern: hexagonal scutes -->
  <path d="M 190 230 L 210 215 L 240 215 L 260 230 L 240 245 L 210 245 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.5"/>
  <path d="M 240 230 L 260 215 L 290 215 L 310 230 L 290 245 L 260 245 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.5"/>
  <path d="M 210 215 L 225 200 L 250 200 L 265 215 L 250 228 L 225 228 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.4"/>
  <path d="M 200 250 L 220 240 L 250 240 L 270 255 L 250 268 L 220 268 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.4"/>
  <path d="M 250 250 L 270 240 L 300 240 L 320 255 L 300 268 L 270 268 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.4"/>
  <!-- Shell ridge line -->
  <path d="M 140 250 Q 200 220, 250 220 Q 300 220, 360 250" fill="none" stroke="#1B5E20" stroke-width="2" opacity="0.3"/>

  <!-- Front legs -->
  <ellipse cx="355" cy="275" rx="30" ry="16" fill="url(#skin)" stroke="#2E7D32" stroke-width="2" transform="rotate(15 355 275)"/>
  <path d="M 378 268 L 390 262 M 382 274 L 394 270 M 384 280 L 395 278" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Neck (extending forward, snapping turtle has long neck) -->
  <path d="M 350 240 Q 380 225, 400 215 Q 415 208, 420 205"
        fill="none" stroke="url(#skin)" stroke-width="28" stroke-linecap="round"/>
  <path d="M 350 240 Q 380 225, 400 215 Q 415 208, 420 205"
        fill="none" stroke="#2E7D32" stroke-width="2"/>

  <!-- Head (angular, snapping turtle features) -->
  <path d="M 405 190 Q 430 180, 445 190 Q 455 198, 450 210 Q 445 220, 430 222 Q 415 222, 405 215 Z"
        fill="url(#skin)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Beak/jaw (distinctive snapping turtle hooked beak) -->
  <path d="M 445 195 Q 460 192, 462 200 Q 460 206, 450 208"
        fill="#F1DB4B" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>

  <!-- Lower jaw (open, snapping!) -->
  <path d="M 445 208 Q 458 212, 460 218 Q 458 222, 448 220"
        fill="#A5D6A7" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="425" cy="198" r="6" fill="#1B5E20"/>
  <circle cx="427" cy="196" r="2.5" fill="white"/>

  <!-- Bumpy texture on head/neck -->
  <circle cx="410" cy="210" r="2" fill="#2E7D32" opacity="0.3"/>
  <circle cx="418" cy="215" r="1.5" fill="#2E7D32" opacity="0.3"/>
  <circle cx="400" cy="218" r="1.8" fill="#2E7D32" opacity="0.3"/>

  <!-- "Snapped" text lines flying from beak: sentences broken apart -->
  <rect x="462" y="183" width="30" height="4" rx="2" fill="#FF655D" opacity="0.9" transform="rotate(-10 462 183)"/>
  <circle cx="494" cy="181" r="3" fill="#FF655D"/>

  <rect x="465" y="198" width="22" height="4" rx="2" fill="#FF655D" opacity="0.9"/>
  <circle cx="489" cy="200" r="3" fill="#FF655D"/>

  <rect x="462" y="213" width="26" height="4" rx="2" fill="#FF655D" opacity="0.9" transform="rotate(10 462 213)"/>
  <circle cx="490" cy="217" r="3" fill="#FF655D"/>

  <!-- Name -->
  <text x="256" y="390" font-family="Jost, Inter, system-ui, sans-serif" font-size="58"
        font-weight="700" fill="#004D40" text-anchor="middle" letter-spacing="3">snapper</text>

  <!-- Tagline -->
  <text x="256" y="420" font-family="Jost, Inter, system-ui, sans-serif" font-size="16"
        fill="#004D40" opacity="0.6" text-anchor="middle" letter-spacing="2">SEMANTIC LINE BREAKS</text>
</svg>
