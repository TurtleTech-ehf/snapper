name: Documentation

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy landing page
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          cname: snapper.rgoswami.me

  sphinx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: site
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          environments: docs

      - name: Build Sphinx docs
        run: pixi run -e docs docbld

      # Sphinx docs deploy to a /docs/ subpath in the future if needed.
      # For now the landing page is the primary site.
