[package]
name = "snapper-fmt"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Semantic line break formatter for Org, LaTeX, Markdown, and plaintext"
repository = "https://github.com/TurtleTech-ehf/snapper"
license = "MIT"
keywords = ["semantic", "linebreak", "formatter", "latex", "orgmode"]
categories = ["command-line-utilities", "text-processing"]
readme = "README.md"

[[bin]]
name = "snapper"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "string"] }
unicode-segmentation = "1"
regex = "1"
textwrap = "0.16"
thiserror = "2"
anyhow = "1"
imara-diff = "0.2"
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ec4rs = "1"

[features]
default = []
neural = ["dep:nnsplit"]

[dependencies.nnsplit]
version = "0.5"
optional = true

[dev-dependencies]
tempfile = "3"
pretty_assertions = "1"

[profile.release]
lto = true
codegen-units = 1
strip = true
